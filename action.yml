name: 'PatchFlow Security Scan'
description: 'Run PatchFlow security analysis (SCA + SAST + secrets) and upload SARIF to GitHub Code Scanning'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  scan-profile:
    description: 'Scan profile: quick, standard, or deep'
    required: false
    default: 'standard'
  fail-on-risk:
    description: 'Fail the workflow if risk score exceeds this threshold (0-100, 0 = never fail)'
    required: false
    default: '0'
  extra-args:
    description: 'Additional arguments to pass to patchflow scan run'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version: '1.26.4'

    - name: Install PatchFlow CLI
      shell: bash
      env:
        PATCHFLOW_ACTION_REF: ${{ github.action_ref || 'main' }}
      run: go install "github.com/Patchflow-security/patchflow-cli@${PATCHFLOW_ACTION_REF}"

    - name: Run PatchFlow scan
      shell: bash
      env:
        PATCHFLOW_SCAN_PROFILE: ${{ inputs.scan-profile }}
        PATCHFLOW_EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set -euo pipefail
        extra_args=()
        if [ -n "$PATCHFLOW_EXTRA_ARGS" ]; then
          read -r -a extra_args <<< "$PATCHFLOW_EXTRA_ARGS"
        fi
        patchflow scan run --format sarif --output patchflow-results.sarif --profile "$PATCHFLOW_SCAN_PROFILE" "${extra_args[@]}"

    - name: Upload SARIF to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
      with:
        sarif_file: patchflow-results.sarif
        category: patchflow

    - name: Check risk threshold
      if: ${{ inputs.fail-on-risk != '0' }}
      shell: bash
      env:
        PATCHFLOW_SCAN_PROFILE: ${{ inputs.scan-profile }}
        PATCHFLOW_EXTRA_ARGS: ${{ inputs.extra-args }}
        PATCHFLOW_FAIL_ON_RISK: ${{ inputs.fail-on-risk }}
      run: |
        set -euo pipefail
        if ! [[ "$PATCHFLOW_FAIL_ON_RISK" =~ ^[0-9]+$ ]]; then
          echo "::error::fail-on-risk must be an integer from 0 to 100"
          exit 1
        fi
        if [ "$PATCHFLOW_FAIL_ON_RISK" -gt 100 ]; then
          echo "::error::fail-on-risk must be an integer from 0 to 100"
          exit 1
        fi
        extra_args=()
        if [ -n "$PATCHFLOW_EXTRA_ARGS" ]; then
          read -r -a extra_args <<< "$PATCHFLOW_EXTRA_ARGS"
        fi
        RISK=$(patchflow scan run --format json --output /dev/stdout --profile "$PATCHFLOW_SCAN_PROFILE" "${extra_args[@]}" 2>/dev/null | jq -r '.risk_score // 0')
        if ! [[ "$RISK" =~ ^[0-9]+$ ]]; then
          echo "::error::PatchFlow returned a non-integer risk score: $RISK"
          exit 1
        fi
        if [ "$RISK" -gt "$PATCHFLOW_FAIL_ON_RISK" ]; then
          echo "::error::Risk score $RISK exceeds threshold $PATCHFLOW_FAIL_ON_RISK"
          exit 1
        fi
