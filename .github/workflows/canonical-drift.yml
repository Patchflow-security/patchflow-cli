name: Canonical Repository Drift

on:
  push:
    branches: [main]
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: canonical-repository-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compare:
    name: Compare with public canonical main
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Verify exact canonical commit
        run: scripts/check-canonical-drift.sh
