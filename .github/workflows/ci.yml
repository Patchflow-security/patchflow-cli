name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.26.4']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify go.mod tidy
        if: matrix.os == 'ubuntu-latest'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -ldflags "-s -w" -o patchflow .

      - name: Test
        run: go test $(go list ./... | grep -v /internal/integration) -timeout 5m

      - name: Smoke test (version)
        shell: bash
        run: |
          ./patchflow version
          ./patchflow --help > /dev/null

      - name: Smoke test (config round-trip + scan)
        shell: bash
        run: |
          # Verify the unified --config flag works end-to-end (B11.5.4).
          # This catches the class of bug where rulesconfig and customrules
          # disagree on the rules: schema, breaking custom rule loading.
          mkdir -p /tmp/ci-smoke/.patchflow
          cat > /tmp/ci-smoke/.patchflow/rules.yaml << 'YAML'
          schema_version: "1.0"
          frameworks:
            auto_detect: true
            enabled: []
            disabled: []
          rules:
            - id: CISMOKE-001
              title: CI smoke test rule
              pattern: "eval\\("
              severity: high
              languages: [python]
              confidence: high
              cwe: "CWE-95"
          YAML
          echo 'user = input(); eval(user)' > /tmp/ci-smoke/vuln.py
          cd /tmp/ci-smoke && git init -q
          # Run scan with --config and verify JSON output + custom rule fires.
          # PATCHFLOW_BIN points to the binary built in the previous step.
          OUTPUT=$("$GITHUB_WORKSPACE/patchflow" scan run \
            --config .patchflow/rules.yaml \
            --json --quiet --offline --no-licenses --no-reachability 2>&1)
          echo "$OUTPUT" | grep -q "CISMOKE-001" || {
            echo "FAIL: custom rule CISMOKE-001 not found in output"
            echo "$OUTPUT"
            exit 1
          }
          echo "PASS: --config smoke test — custom rule fired"
          # Verify doctor round-trip check passes
          "$GITHUB_WORKSPACE/patchflow" doctor --json 2>&1 | grep -q '"config_round_trip_ok":true' || {
            echo "FAIL: doctor config_round_trip_ok is not true"
            exit 1
          }
          echo "PASS: doctor config round-trip check"

      - name: Upload binary artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: patchflow-ci-${{ github.sha }}
          path: patchflow
          retention-days: 7

  release-dry-run:
    name: GoReleaser Dry-Run
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.4'

      - name: Install syft (SBOM generation)
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.18.0

      - name: Add syft to PATH
        run: |
          mkdir -p "$RUNNER_TEMP/patchflow-bin"
          ln -sf "${{ steps.syft.outputs.cmd }}" "$RUNNER_TEMP/patchflow-bin/syft"
          echo "$RUNNER_TEMP/patchflow-bin" >> "$GITHUB_PATH"

      - name: GoReleaser snapshot (no publish, validates config)
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: v2.15.4
          args: release --snapshot --clean --skip=publish
        env:
          # Skip publishing to taps/registries during dry-run
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify dist artifacts
        run: |
          ls -la dist/
          test -f dist/checksums.txt
          echo "Checksums preview:"
          head -5 dist/checksums.txt
