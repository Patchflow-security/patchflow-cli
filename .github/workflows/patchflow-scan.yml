name: PatchFlow Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Monday at 09:00 UTC
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  patchflow-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.4'

      - name: Build PatchFlow from source
        run: |
          go build -ldflags "-s -w \
            -X github.com/Patchflow-security/patchflow-cli/pkg/version.Version=ci-scan \
            -X github.com/Patchflow-security/patchflow-cli/pkg/version.Commit=${GITHUB_SHA::7} \
            -X github.com/Patchflow-security/patchflow-cli/pkg/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o patchflow .
          ./patchflow version

      - name: Run PatchFlow scan
        run: ./patchflow scan run --format sarif --output patchflow-results.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        if: always() && hashFiles('patchflow-results.sarif') != ''
        with:
          sarif_file: patchflow-results.sarif
          category: patchflow

      - name: Upload scan results artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always() && hashFiles('patchflow-results.sarif') != ''
        with:
          name: patchflow-sarif
          path: patchflow-results.sarif
