name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Derive release metadata
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            PUBLISH="true"
          else
            TAG="v0.0.0-snapshot-${GITHUB_SHA::7}"
            VERSION="0.0.0-snapshot-${GITHUB_SHA::7}"
            PUBLISH="false"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "publish=${PUBLISH}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=${TAG} version=${VERSION} publish=${PUBLISH}"

      - name: Require a semantic tag on canonical main
        if: steps.meta.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag is not semantic: $TAG" >&2
            exit 1
          fi
          git fetch origin main --tags
          TAG_COMMIT="$(git rev-parse "${TAG}^{commit}")"
          CHECKED_OUT_COMMIT="$(git rev-parse HEAD)"
          test "$TAG_COMMIT" = "$CHECKED_OUT_COMMIT"
          git merge-base --is-ancestor "$TAG_COMMIT" origin/main
          echo "Verified $TAG -> $TAG_COMMIT on canonical origin/main"

      - name: Validate public-launch controls
        env:
          PYTHONDONTWRITEBYTECODE: '1'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/validate-launch-kit.py --check-remote

      - name: Run tests
        run: go test $(go list ./... | grep -v /internal/integration) -timeout 5m

      - name: Install syft (SBOM generation)
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.18.0

      - name: Add syft to PATH
        run: |
          mkdir -p "$RUNNER_TEMP/patchflow-bin"
          ln -sf "${{ steps.syft.outputs.cmd }}" "$RUNNER_TEMP/patchflow-bin/syft"
          echo "$RUNNER_TEMP/patchflow-bin" >> "$GITHUB_PATH"

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Docker Login (GHCR)
        if: steps.meta.outputs.publish == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.meta.outputs.publish == 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Run GoReleaser (publish)
        if: steps.meta.outputs.publish == 'true'
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: v2.15.4
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}

      - name: Run GoReleaser (snapshot, no publish)
        if: steps.meta.outputs.publish != 'true'
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: v2.15.4
          args: release --snapshot --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign Docker images with cosign
        if: steps.meta.outputs.publish == 'true'
        run: |
          cosign sign --yes ghcr.io/patchflow-security/cli:latest
          cosign sign --yes ghcr.io/patchflow-security/cli:${{ steps.meta.outputs.version }}

      - name: Sign checksums with cosign
        if: steps.meta.outputs.publish == 'true'
        working-directory: dist
        run: |
          cosign sign-blob --yes \
            --output-certificate checksums.txt.pem \
            --output-signature checksums.txt.sig \
            checksums.txt

      - name: Upload cosign signatures to release
        if: steps.meta.outputs.publish == 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/checksums.txt.pem
            dist/checksums.txt.sig
            dist/*.spdx.json

      - name: Verify release artifacts
        if: steps.meta.outputs.publish == 'true'
        working-directory: dist
        run: |
          set -e
          echo "=== Dist contents ==="
          ls -la
          echo "=== Checksums ==="
          cat checksums.txt
          echo "=== Verify checksums ==="
          sha256sum -c checksums.txt
          echo "=== Verify cosign blob signature ==="
          cosign verify-blob \
            --certificate checksums.txt.pem \
            --signature checksums.txt.sig \
            --certificate-identity "https://github.com/Patchflow-security/patchflow-cli/.github/workflows/release.yml@refs/tags/${{ steps.meta.outputs.tag }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            checksums.txt

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-dist-${{ steps.meta.outputs.version }}
          path: dist/
          retention-days: 14

  notify:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: release
    if: always()
    steps:
      - name: Release status
        run: |
          echo "### Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ needs.release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ needs.release.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts retained for 14 days in the Actions run." >> $GITHUB_STEP_SUMMARY
