name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run a snapshot release without publishing (no tag required)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Derive release metadata
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            PUBLISH="true"
          else
            TAG="v0.0.0-snapshot-${GITHUB_SHA::7}"
            VERSION="0.0.0-snapshot-${GITHUB_SHA::7}"
            PUBLISH="false"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "publish=${PUBLISH}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=${TAG} version=${VERSION} publish=${PUBLISH}"

      - name: Run tests
        run: go test ./... -timeout 10m

      - name: Install syft (SBOM generation)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Docker Login (GHCR)
        if: steps.meta.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser (publish)
        if: steps.meta.outputs.publish == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}

      - name: Run GoReleaser (snapshot, no publish)
        if: steps.meta.outputs.publish != 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign Docker images with cosign
        if: steps.meta.outputs.publish == 'true'
        run: |
          cosign sign --yes ghcr.io/patchflow-security/cli:latest
          cosign sign --yes ghcr.io/patchflow-security/cli:${{ steps.meta.outputs.version }}
          cosign sign --yes ghcr.io/patchflow-security/cli:latest-amd64
          cosign sign --yes ghcr.io/patchflow-security/cli:latest-arm64

      - name: Sign checksums with cosign
        if: steps.meta.outputs.publish == 'true'
        working-directory: dist
        run: |
          cosign sign-blob --yes \
            --output-certificate checksums.txt.pem \
            --output-signature checksums.txt.sig \
            checksums.txt

      - name: Upload cosign signatures to release
        if: steps.meta.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/checksums.txt.pem
            dist/checksums.txt.sig
            dist/*.spdx.json

      - name: Verify release artifacts
        if: steps.meta.outputs.publish == 'true'
        working-directory: dist
        run: |
          set -e
          echo "=== Dist contents ==="
          ls -la
          echo "=== Checksums ==="
          cat checksums.txt
          echo "=== Verify checksums ==="
          sha256sum -c checksums.txt
          echo "=== Verify cosign blob signature ==="
          cosign verify-blob \
            --certificate checksums.txt.pem \
            --signature checksums.txt.sig \
            checksums.txt

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ steps.meta.outputs.version }}
          path: dist/
          retention-days: 14

  notify:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: release
    if: always()
    steps:
      - name: Release status
        run: |
          echo "### Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ needs.release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ needs.release.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts retained for 14 days in the Actions run." >> $GITHUB_STEP_SUMMARY
