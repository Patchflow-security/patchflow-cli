schema_version: "1.0"
frameworks:
  auto_detect: true
  enabled: [laravel]
  disabled: []

framework_extensions:
  laravel:
    safe_patterns:
      - pattern: "->where\\(|DB::select\\s*\\([^,]+,\\s*\\[|DB::select\\s*\\([^,]+,\\s*\\$"
        reason: "Parameterized Eloquent/DB query builder — taint through bindings is safe"

rules: []
